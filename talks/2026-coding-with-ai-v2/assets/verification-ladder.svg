<svg viewBox="0 0 1280 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Verification ladder: four ascending steps from local reproducer to cluster validation; steps one and two form the inner loop, steps three and four form the outer gate">
  <defs>
    <marker id="mBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8fb0dc"/>
    </marker>
    <marker id="mMuted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa1ad"/>
    </marker>
  </defs>

  <!-- axis annotation along the rise -->
  <text x="236" y="296" text-anchor="end" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">runs often</text>
  <line x1="250" y1="290" x2="990" y2="85" stroke="#9aa1ad" stroke-width="2" marker-end="url(#mMuted)"/>
  <text x="1004" y="76" text-anchor="start" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">runs rarely, proves more</text>

  <!-- step arrows -->
  <line x1="302" y1="429" x2="338" y2="393" stroke="#8fb0dc" stroke-width="2.5" marker-end="url(#mBlue)"/>
  <line x1="622" y1="353" x2="658" y2="317" stroke="#8fb0dc" stroke-width="2.5" marker-end="url(#mBlue)"/>
  <line x1="942" y1="277" x2="978" y2="241" stroke="#8fb0dc" stroke-width="2.5" marker-end="url(#mBlue)"/>

  <!-- step 1: local reproducer -->
  <rect x="24" y="364" width="272" height="170" rx="10" fill="#2a2c31" stroke="#3a3d44" stroke-width="2"/>
  <text x="160" y="416" text-anchor="middle" font-size="28" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">local reproducer</text>
  <text x="160" y="452" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">every iteration ·</text>
  <text x="160" y="479" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">reduced system,</text>
  <text x="160" y="506" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">small fixtures</text>

  <!-- step 2: reduced integration case -->
  <rect x="344" y="288" width="272" height="170" rx="10" fill="#2a2c31" stroke="#3a3d44" stroke-width="2"/>
  <text x="480" y="350" text-anchor="middle" font-size="28" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">reduced</text>
  <text x="480" y="384" text-anchor="middle" font-size="28" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">integration case</text>
  <text x="480" y="420" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">before handoff or commit</text>

  <!-- step 3: original system re-run -->
  <rect x="664" y="212" width="272" height="170" rx="10" fill="#2a2c31" stroke="#3a3d44" stroke-width="2"/>
  <text x="800" y="248" text-anchor="middle" font-size="28" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">original system</text>
  <text x="800" y="281" text-anchor="middle" font-size="28" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">re-run</text>
  <text x="800" y="311" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">the failing case or a</text>
  <text x="800" y="338" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">canonical example ·</text>
  <text x="800" y="365" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">at the phase boundary</text>

  <!-- step 4: cluster validation -->
  <rect x="984" y="136" width="272" height="170" rx="10" fill="#2a2c31" stroke="#3a3d44" stroke-width="2"/>
  <text x="1120" y="176" text-anchor="middle" font-size="28" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">cluster validation</text>
  <text x="1120" y="208" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">when MPI scale,</text>
  <text x="1120" y="234" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">hardware, scheduler,</text>
  <text x="1120" y="260" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">memory, or environment</text>
  <text x="1120" y="286" text-anchor="middle" font-size="22" fill="#9aa1ad" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">matter</text>

  <!-- inner-loop bracket (steps 1-2) -->
  <path d="M 24 546 L 24 556 L 616 556 L 616 546" fill="none" stroke="#8fb0dc" stroke-width="2"/>
  <text x="320" y="586" text-anchor="middle" font-size="24" fill="#8fb0dc" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">inner loop · cheap, runs constantly</text>

  <!-- outer-gate bracket (steps 3-4), the one gold element -->
  <path d="M 664 546 L 664 556 L 1256 556 L 1256 546" fill="none" stroke="#FABD0F" stroke-width="2"/>
  <text x="960" y="586" text-anchor="middle" font-size="24" fill="#FABD0F" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">outer gate · scientific evidence</text>
</svg>
