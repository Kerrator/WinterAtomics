<svg viewBox="0 0 1280 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The context window drawn as one long region with two overlapping zones: a gold adaptable zone on the left, focused and easy to steer with attention concentrated on a few tokens, and a grey rigid zone on the right, crowded and set in its ways with attention spread thin across many tokens; an arrow underneath shows the window filling toward capacity">
  <defs>
    <marker id="arrowGrey" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4.5 L0,9 Z" fill="#9aa1ad"/>
    </marker>
  </defs>

  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">

    <!-- the context window -->
    <text x="70" y="96" font-size="22" fill="#9aa1ad" font-family="ui-monospace, 'SF Mono', Menlo, monospace">context window</text>
    <rect x="70" y="116" width="1140" height="264" rx="24" fill="#2a2c31" opacity="0.5" stroke="#3a3d44" stroke-width="2.5"/>

    <!-- adaptable zone (left, gold) -->
    <rect x="90" y="136" width="560" height="224" rx="18" fill="#FABD0F" opacity="0.08"/>
    <rect x="90" y="136" width="560" height="224" rx="18" fill="none" stroke="#FABD0F" stroke-width="2" opacity="0.85"/>
    <text x="110" y="182" font-size="28" fill="#FABD0F" font-weight="600">Adaptable</text>
    <text x="110" y="214" font-size="22" fill="#e8eaee">focused and easy to steer</text>

    <!-- rigid zone (right, grey), overlapping the adaptable zone -->
    <rect x="520" y="136" width="670" height="224" rx="18" fill="#9aa1ad" opacity="0.08"/>
    <rect x="520" y="136" width="670" height="224" rx="18" fill="none" stroke="#9aa1ad" stroke-width="2" opacity="0.85"/>
    <text x="1170" y="182" font-size="28" fill="#e8eaee" font-weight="600" text-anchor="end">Rigid</text>
    <text x="1170" y="214" font-size="22" fill="#9aa1ad" text-anchor="end">crowded and set in its ways</text>

    <!-- a small, targeted cluster in the adaptable zone (same packing as the crowd) -->
    <g fill="#002452" stroke="#FABD0F" stroke-width="2">
      <circle cx="152" cy="244" r="8"/>
      <circle cx="208" cy="238" r="8"/>
      <circle cx="262" cy="246" r="8"/>
      <circle cx="156" cy="298" r="8"/>
      <circle cx="212" cy="304" r="8"/>
      <circle cx="266" cy="296" r="8"/>
    </g>
    <text x="300" y="345" font-size="20" fill="#e8eaee" text-anchor="middle">attention concentrated on what matters</text>

    <!-- transition: the overlap band picks up density -->
    <g fill="#002452" stroke="#FABD0F" stroke-width="2" opacity="0.7">
      <circle cx="545" cy="292" r="8"/>
    </g>
    <g fill="#2a2c31" stroke="#8fb0dc" stroke-width="2" opacity="0.7">
      <circle cx="583" cy="252" r="8"/>
      <circle cx="622" cy="306" r="8"/>
    </g>

    <!-- crowded tokens in the rigid zone -->
    <g fill="#2a2c31" stroke="#8fb0dc" stroke-width="2" opacity="0.65">
      <circle cx="688" cy="246" r="8"/>
      <circle cx="726" cy="292" r="8"/>
      <circle cx="762" cy="248" r="8"/>
      <circle cx="800" cy="304" r="8"/>
      <circle cx="838" cy="252" r="8"/>
      <circle cx="872" cy="296" r="8"/>
      <circle cx="908" cy="244" r="8"/>
      <circle cx="944" cy="300" r="8"/>
      <circle cx="980" cy="250" r="8"/>
      <circle cx="1014" cy="296" r="8"/>
      <circle cx="1050" cy="246" r="8"/>
      <circle cx="1086" cy="300" r="8"/>
      <circle cx="1122" cy="252" r="8"/>
      <circle cx="1158" cy="296" r="8"/>
      <circle cx="707" cy="318" r="8"/>
      <circle cx="781" cy="320" r="8"/>
      <circle cx="855" cy="318" r="8"/>
      <circle cx="929" cy="322" r="8"/>
      <circle cx="1003" cy="318" r="8"/>
      <circle cx="1077" cy="322" r="8"/>
      <circle cx="1145" cy="320" r="8"/>
    </g>
    <text x="920" y="345" font-size="20" fill="#9aa1ad" text-anchor="middle">attention spread thin across the crowd</text>

    <!-- fill axis -->
    <line x1="90" y1="428" x2="1150" y2="428" stroke="#9aa1ad" stroke-width="2" marker-end="url(#arrowGrey)"/>
    <text x="620" y="464" font-size="22" fill="#9aa1ad" text-anchor="middle">the window fills</text>
    <text x="1190" y="464" font-size="20" fill="#9aa1ad" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace">capacity</text>
  </g>
</svg>
