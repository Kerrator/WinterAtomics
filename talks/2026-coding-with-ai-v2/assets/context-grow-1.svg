<svg viewBox="0 0 1280 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A nearly empty context window: six tokens sit in the gold adaptable band and the newest position attends strongly to each of them with a few bold lines">
  <defs>
    <marker id="arrowGrey" markerWidth="10" markerHeight="9" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4.5 L0,9 Z" fill="#9aa1ad"/>
    </marker>
  </defs>
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <text x="70" y="96" font-size="22" fill="#9aa1ad" font-family="ui-monospace, 'SF Mono', Menlo, monospace">context window</text>
  <rect x="70" y="116" width="1140" height="264" rx="24" fill="#2a2c31" opacity="0.5" stroke="#3a3d44" stroke-width="2.5"/>
  <rect x="90" y="136" width="560" height="224" rx="18" fill="#FABD0F" opacity="0.05"/>
  <rect x="90" y="136" width="560" height="224" rx="18" fill="none" stroke="#FABD0F" stroke-width="1.5" opacity="0.4"/>
  <text x="110" y="174" font-size="24" fill="#FABD0F" opacity="0.75" font-weight="600">Adaptable</text>
  <rect x="520" y="136" width="670" height="224" rx="18" fill="#9aa1ad" opacity="0.05"/>
  <rect x="520" y="136" width="670" height="224" rx="18" fill="none" stroke="#9aa1ad" stroke-width="1.5" opacity="0.4"/>
  <text x="1170" y="174" font-size="24" fill="#e8eaee" opacity="0.75" font-weight="600" text-anchor="end">Rigid</text>
  <line x1="90" y1="428" x2="1150" y2="428" stroke="#9aa1ad" stroke-width="2" marker-end="url(#arrowGrey)"/>
  <text x="620" y="464" font-size="22" fill="#9aa1ad" text-anchor="middle">the window fills</text>
  <text x="1190" y="464" font-size="20" fill="#9aa1ad" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace">capacity</text>

    <line x1="180" y1="318" x2="116" y2="194" stroke="#FABD0F" stroke-width="2.2" opacity="0.85"/>
    <line x1="180" y1="318" x2="120" y2="257" stroke="#FABD0F" stroke-width="2.2" opacity="0.85"/>
    <line x1="180" y1="318" x2="124" y2="320" stroke="#FABD0F" stroke-width="2.2" opacity="0.85"/>
    <line x1="180" y1="318" x2="181" y2="205" stroke="#FABD0F" stroke-width="2.2" opacity="0.85"/>
    <line x1="180" y1="318" x2="176" y2="255" stroke="#FABD0F" stroke-width="2.2" opacity="0.85"/>
    <circle cx="116" cy="194" r="8" fill="#002452" stroke="#FABD0F" stroke-width="2" opacity="0.85"/>
    <circle cx="120" cy="257" r="8" fill="#002452" stroke="#FABD0F" stroke-width="2" opacity="0.85"/>
    <circle cx="124" cy="320" r="8" fill="#002452" stroke="#FABD0F" stroke-width="2" opacity="0.85"/>
    <circle cx="181" cy="205" r="8" fill="#002452" stroke="#FABD0F" stroke-width="2" opacity="0.85"/>
    <circle cx="176" cy="255" r="8" fill="#002452" stroke="#FABD0F" stroke-width="2" opacity="0.85"/>
    <circle cx="180" cy="318" r="10" fill="#FABD0F"/>
    <text x="180" y="358" font-size="20" fill="#FABD0F" text-anchor="middle">next token</text>
  </g>
