<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <title>The Kanban board as the study's dependency graph: five pipeline stages in series, parallel sibling lanes, a tracer-bullet first ticket, and the horizontal anti-pattern</title>
  <desc>Five dark-blue pipeline stages (build, minimize, search, select, analyze) run left to right in series. A thin gold path threads through all five as ticket 1, the tracer bullet: one thin slice through every stage. Three stacked lanes below (seeds, temperatures, compositions) are embarrassingly parallel siblings. Tickets are worktree and branch names. A right-hand inset shows the horizontal anti-pattern (all schema, then all solver, then all analysis) crossed out in vermillion: no feedback until the last layer. A dark-blue caption bar reads cut vertically, never horizontally.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#002452"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b08d2b"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>

  <!-- ===== Title ===== -->
  <text x="64" y="56" font-size="33" font-weight="800" fill="#002452">The board is the study's dependency graph</text>
  <text x="64" y="88" font-size="20" fill="#5a5650">Stages in series; seeds, temperatures, compositions in parallel; the first ticket is a tracer bullet</text>

  <!-- ===== Row label ===== -->
  <text x="64" y="134" font-size="15" font-weight="700" fill="#b08d2b" letter-spacing="1.5">STAGES IN SERIES &#8594;</text>

  <!-- ===== Pipeline stages (in series) ===== -->
  <!-- centers: 128, 290, 452, 614, 776 ; nodes y=148 h=58 -->
  <g>
    <rect x="64" y="148" width="128" height="58" rx="10" fill="#002452"/>
    <circle cx="82" cy="163" r="10" fill="#ffffff"/>
    <text x="82" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#002452">1</text>
    <text x="128" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">build</text>
  </g>
  <g>
    <rect x="226" y="148" width="128" height="58" rx="10" fill="#002452"/>
    <circle cx="244" cy="163" r="10" fill="#ffffff"/>
    <text x="244" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#002452">2</text>
    <text x="290" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">minimize</text>
  </g>
  <g>
    <rect x="388" y="148" width="128" height="58" rx="10" fill="#002452"/>
    <circle cx="406" cy="163" r="10" fill="#ffffff"/>
    <text x="406" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#002452">3</text>
    <text x="452" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">search</text>
  </g>
  <g>
    <rect x="550" y="148" width="128" height="58" rx="10" fill="#002452"/>
    <circle cx="568" cy="163" r="10" fill="#ffffff"/>
    <text x="568" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#002452">4</text>
    <text x="614" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">select</text>
  </g>
  <g>
    <rect x="712" y="148" width="128" height="58" rx="10" fill="#002452"/>
    <circle cx="730" cy="163" r="10" fill="#ffffff"/>
    <text x="730" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#002452">5</text>
    <text x="776" y="184" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">analyze</text>
  </g>

  <!-- forward arrows (series) -->
  <line x1="194" y1="177" x2="224" y2="177" stroke="#002452" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="356" y1="177" x2="386" y2="177" stroke="#002452" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="518" y1="177" x2="548" y2="177" stroke="#002452" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="177" x2="710" y2="177" stroke="#002452" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Tracer bullet: one thin gold path through all five stages ===== -->
  <!-- connectors from each stage down to the gold path -->
  <line x1="128" y1="206" x2="128" y2="223" stroke="#b08d2b" stroke-width="2.5"/>
  <line x1="290" y1="206" x2="290" y2="223" stroke="#b08d2b" stroke-width="2.5"/>
  <line x1="452" y1="206" x2="452" y2="223" stroke="#b08d2b" stroke-width="2.5"/>
  <line x1="614" y1="206" x2="614" y2="223" stroke="#b08d2b" stroke-width="2.5"/>
  <line x1="776" y1="206" x2="776" y2="223" stroke="#b08d2b" stroke-width="2.5"/>
  <!-- gold path: halo then bright line then arrowhead -->
  <line x1="64" y1="226" x2="838" y2="226" stroke="#b08d2b" stroke-width="7"/>
  <line x1="64" y1="226" x2="830" y2="226" stroke="#FABD0F" stroke-width="4" marker-end="url(#arrowGold)"/>
  <!-- gold dots at each stage -->
  <circle cx="128" cy="226" r="6" fill="#FABD0F" stroke="#b08d2b" stroke-width="1.5"/>
  <circle cx="290" cy="226" r="6" fill="#FABD0F" stroke="#b08d2b" stroke-width="1.5"/>
  <circle cx="452" cy="226" r="6" fill="#FABD0F" stroke="#b08d2b" stroke-width="1.5"/>
  <circle cx="614" cy="226" r="6" fill="#FABD0F" stroke="#b08d2b" stroke-width="1.5"/>
  <circle cx="776" cy="226" r="6" fill="#FABD0F" stroke="#b08d2b" stroke-width="1.5"/>
  <text x="64" y="252" font-size="16" fill="#002452"><tspan font-weight="700">ticket 1:</tspan><tspan dx="8">the tracer bullet (one thin slice through every stage)</tspan></text>

  <!-- ===== Parallel sibling lanes ===== -->
  <text x="96" y="294" font-size="16" font-weight="700" fill="#002452">embarrassingly parallel siblings</text>
  <!-- grouping brace -->
  <path d="M88,306 q-8,0 -8,12 v45 q0,12 -8,12 q8,0 8,12 v45 q0,12 8,12" fill="none" stroke="#002452" stroke-width="2"/>
  <!-- lanes -->
  <rect x="96" y="306" width="742" height="38" rx="6" fill="#f3f1ea" stroke="#c9c2ad" stroke-width="1.5"/>
  <text x="112" y="330" font-size="16" fill="#1a1a1a">seed 1 &#183; seed 2 &#183; seed 3</text>
  <rect x="96" y="356" width="742" height="38" rx="6" fill="#f3f1ea" stroke="#c9c2ad" stroke-width="1.5"/>
  <text x="112" y="380" font-size="16" fill="#1a1a1a">T = 300 K &#183; 500 K &#183; 700 K</text>
  <rect x="96" y="406" width="742" height="38" rx="6" fill="#f3f1ea" stroke="#c9c2ad" stroke-width="1.5"/>
  <text x="112" y="430" font-size="16" fill="#1a1a1a">Ni &#183; Ni-Fe &#183; Ni-Cr</text>

  <!-- ===== Tickets are worktree + branch names ===== -->
  <text x="96" y="486" font-size="16" font-weight="700" fill="#002452">tickets are worktree + branch names</text>
  <rect x="96" y="498" width="178" height="36" rx="6" fill="#e9edf3" stroke="#9fb0c8" stroke-width="1.5"/>
  <text x="110" y="521" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#002452">pyKMC-htst-work</text>
  <rect x="290" y="498" width="214" height="36" rx="6" fill="#e9edf3" stroke="#9fb0c8" stroke-width="1.5"/>
  <text x="304" y="521" font-size="15" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#002452">fix/htst-rate-units</text>

  <!-- ===== Anti-pattern inset: horizontal layers, crossed out ===== -->
  <rect x="864" y="148" width="352" height="386" rx="12" fill="#fdf1ec" stroke="#D55E00" stroke-width="1.5"/>
  <text x="886" y="184" font-size="13" font-weight="700" fill="#D55E00" letter-spacing="1.2">HORIZONTAL (ANTI-PATTERN)</text>
  <!-- horizontal layer bars -->
  <rect x="888" y="204" width="304" height="52" rx="6" fill="#ece7dd" stroke="#c9c2ad" stroke-width="1.5"/>
  <text x="1040" y="236" text-anchor="middle" font-size="16" fill="#5a5650">all schema</text>
  <rect x="888" y="270" width="304" height="52" rx="6" fill="#ece7dd" stroke="#c9c2ad" stroke-width="1.5"/>
  <text x="1040" y="302" text-anchor="middle" font-size="16" fill="#5a5650">all solver</text>
  <rect x="888" y="336" width="304" height="52" rx="6" fill="#ece7dd" stroke="#c9c2ad" stroke-width="1.5"/>
  <text x="1040" y="368" text-anchor="middle" font-size="16" fill="#5a5650">all analysis</text>
  <!-- vermillion cross -->
  <line x1="892" y1="208" x2="1188" y2="384" stroke="#D55E00" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="1188" y1="208" x2="892" y2="384" stroke="#D55E00" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- labels -->
  <text x="886" y="424" font-size="16" font-weight="700" fill="#D55E00">no feedback until the last layer</text>
  <text x="886" y="450" font-size="14" fill="#5a5650">integration bugs wait at the seam</text>
  <text x="886" y="500" font-size="14" font-weight="600" fill="#009E73">a vertical first slice avoids this</text>

  <!-- ===== Caption bar ===== -->
  <rect x="64" y="630" width="1152" height="62" rx="10" fill="#002452"/>
  <rect x="64" y="630" width="8" height="62" rx="4" fill="#B90E31"/>
  <text x="92" y="660" font-size="21" font-weight="700" fill="#ffffff">Cut vertically, never horizontally.</text>
  <text x="92" y="684" font-size="19" fill="#f3f1ea">The tracer bullet flushes the integration unknowns at the seams in an afternoon.</text>
</svg>
